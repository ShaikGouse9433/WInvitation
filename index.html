<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

<!-- ===========================
     Background Music
=========================== -->

<audio id="bgMusic" loop>
    <source src="music/Wsong.mpeg" type="audio/mpeg">
</audio>

<!-- Sparkles -->

<div class="sparkles"></div>

<!-- Falling Flowers -->

<div class="flowers"></div>

<!-- ===========================
     PREMIUM ENVELOPE
=========================== -->

<div id="envelopeContainer">

    <div id="envelope">

        <!-- Envelope Back -->

        <div class="back"></div>

        <!-- Premium Letter -->

        <div id="letter">

            <img
                src="images/page11.jpeg"
                id="invitationPreview"
                alt="Wedding Invitation">

        </div>

        <!-- Left Fold -->

        <div class="leftFold"></div>

        <!-- Right Fold -->

        <div class="rightFold"></div>

        <!-- Bottom Fold -->

        <div class="bottomFold"></div>

        <!-- Top Flap -->

        <div class="topFold">

            <div class="flapShine"></div>

        </div>

        <!-- Premium Wax Seal -->

        <div id="seal">

            <div class="sealCircle">

                <span class="sealText">SA</span>

            </div>

            <small>Tap to Open</small>

        </div>

    </div>

</div>

<!-- ===========================
        INVITATION PAGES
=========================== -->

<div id="pages">

    <div class="page">
        <img src="images/page21.jpeg" alt="Invitation Page 1">
    </div>

    <div class="page">
        <img src="images/page22.jpeg" alt="Invitation Page 2">
    </div>

    <div class="page">
        <img src="images/page23.jpeg" alt="Invitation Page 3">
    </div>

    <div class="page">
        <img src="images/page24.jpeg" alt="Invitation Page 4">
    </div>

    <!-- ===========================
            COUNTDOWN
    =========================== -->

    <div class="countdownPage">

        <h1>Wedding Countdown</h1>

        <div class="timer">

            <div>

                <span id="days">00</span>

                <p>Days</p>

            </div>

            <div>

                <span id="hours">00</span>

                <p>Hours</p>

            </div>

            <div>

                <span id="minutes">00</span>

                <p>Minutes</p>

            </div>

            <div>

                <span id="seconds">00</span>

                <p>Seconds</p>

            </div>

        </div>

    </div>
        <div class="page">
        <img src="images/page25.jpeg" alt="Invitation Page 5">
    </div>

    <div class="page">
        <img src="images/page26.jpeg" alt="Invitation Page 6">
    </div>

    <div class="page">
        <img src="images/page27.jpeg" alt="Invitation Page 7">
    </div>

    <div class="page">
        <img src="images/page28.jpeg" alt="Invitation Page 8">
    </div>

</div>

<!-- ===========================
        CONTROLS
=========================== -->

<div class="controls">

    <button id="prev" title="Previous Page">
        <i class="fa-solid fa-arrow-left"></i>
    </button>

    <button id="next" title="Next Page">
        <i class="fa-solid fa-arrow-right"></i>
    </button>

    <button id="musicBtn" title="Music">
        <i class="fa-solid fa-volume-high"></i>
    </button>

</div>

<!-- ===========================
        JAVASCRIPT
=========================== -->

<script src="script.js"></script>

</body>
</html>
